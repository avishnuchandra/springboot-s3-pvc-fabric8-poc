apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-s3-pvc
  namespace: springboot-s3-pvc
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
