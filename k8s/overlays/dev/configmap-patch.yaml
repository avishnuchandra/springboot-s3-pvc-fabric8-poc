apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-config
  namespace: springboot-s3-pvc
data:
  AWS_REGION: "us-east-1"
  S3_BUCKET: "dev-app-bucket"
  # LocalStack endpoint — used for local/dev S3 emulation
  S3_ENDPOINT: "http://localstack:4566"
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "local"
  PVC_MOUNT_PATH: "/mnt/data"
