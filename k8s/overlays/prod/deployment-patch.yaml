apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-s3-pvc
  namespace: springboot-s3-pvc
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
