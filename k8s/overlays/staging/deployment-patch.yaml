apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-s3-pvc
  namespace: springboot-s3-pvc
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
