# ServiceMonitor for Prometheus Operator / OpenShift Monitoring
# Prerequisites:
#   1. The Prometheus Operator (or OpenShift built-in monitoring) must be installed.
#   2. The application must expose /actuator/prometheus.
#      Add to build.gradle:
#        implementation 'io.micrometer:micrometer-registry-prometheus'
#      Add to application.properties:
#        management.endpoints.web.exposure.include=health,info,prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: springboot-s3-pvc
  namespace: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
    app.kubernetes.io/name: springboot-s3-pvc
    app.kubernetes.io/component: monitoring
    # This label is required by the Prometheus Operator to discover ServiceMonitors
    team: backend
spec:
  selector:
    matchLabels:
      app: springboot-s3-pvc
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
