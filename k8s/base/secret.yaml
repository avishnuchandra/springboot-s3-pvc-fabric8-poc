# =============================================================================
# SECRET TEMPLATE — DO NOT COMMIT REAL CREDENTIALS
# =============================================================================
# Replace the placeholder values below with your real AWS credentials before
# applying this manifest. Never store real credentials in source control.
#
# Recommended: create the secret imperatively to avoid credential leakage:
#
#   kubectl create secret generic s3-credentials \
#     --from-literal=AWS_ACCESS_KEY_ID='<your-key-id>' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='<your-secret-key>' \
#     --from-literal=AWS_ROLE_ARN='<optional-role-arn-for-irsa>' \
#     -n springboot-s3-pvc
#
# If running on AWS with an IAM role attached to the pod (IRSA / instance
# profile), the secret is optional. If provided, AWS_ROLE_ARN can be used.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
    app.kubernetes.io/name: springboot-s3-pvc
    app.kubernetes.io/component: credentials
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_ACCESS_KEY_ID"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET_ACCESS_KEY"
  AWS_ROLE_ARN: "REPLACE_WITH_IAM_ROLE_ARN_OR_LEAVE_EMPTY"
