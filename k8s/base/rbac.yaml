---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: springboot-s3-pvc
  namespace: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
    app.kubernetes.io/name: springboot-s3-pvc
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/springboot-s3-app-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: springboot-s3-pvc-role
  namespace: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
    app.kubernetes.io/name: springboot-s3-pvc
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: springboot-s3-pvc-rolebinding
  namespace: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
    app.kubernetes.io/name: springboot-s3-pvc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: springboot-s3-pvc-role
subjects:
  - kind: ServiceAccount
    name: springboot-s3-pvc
    namespace: springboot-s3-pvc
