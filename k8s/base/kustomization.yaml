apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base namespace used when applying the base directly.
# Overlays override this with their own namespace.
namespace: springboot-s3-pvc

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml
  - network-policy.yaml
  - hpa.yaml
  - pdb.yaml
  - monitor.yaml
