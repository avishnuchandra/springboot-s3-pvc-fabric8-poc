apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-s3-pvc
  template:
    metadata:
      labels:
        app: springboot-s3-pvc
      annotations:
        iam.amazonaws.com/role: springboot-s3-app-role
    spec:
      serviceAccountName: springboot-s3-pvc
      containers:
        - name: app
          image: ghcr.io/avishnuchandra/springboot-s3-pvc-fabric8-poc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.bucket
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.region
            - name: S3_INPUT_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.prefix.input
            - name: S3_PROCESSING_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.prefix.processing
            - name: S3_ARCHIVE_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.prefix.archive
            - name: S3_ERROR_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.prefix.error
            - name: S3_COMPLETED_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.prefix.completed
            - name: S3_LOGS_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: s3-config
                  key: s3.prefix.logs
            - name: S3_ENDPOINT
              value: ""
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
                  optional: true
            - name: AWS_ROLE_ARN
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: role-arn
                  optional: true
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
          volumeMounts:
            - name: data
              mountPath: /mnt/data
          readinessProbe:
            httpGet:
              path: /health/all
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/all
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: springboot-pvc
      restartPolicy: Always
