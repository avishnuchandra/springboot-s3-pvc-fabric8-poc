apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-s3-pvc
  labels:
    app: springboot-s3-pvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-s3-pvc
  template:
    metadata:
      labels:
        app: springboot-s3-pvc
    spec:
      serviceAccountName: springboot-s3-pvc
      containers:
        - name: app
          image: ghcr.io/avishnuchandra/springboot-s3-pvc-fabric8-poc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: S3_BUCKET
              value: "app-bucket"
            - name: AWS_REGION
              value: "us-east-1"
            - name: S3_ENDPOINT
              value: ""
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: access-key
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secret-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /mnt/data
          readinessProbe:
            httpGet:
              path: /health/all
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/all
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: springboot-pvc
      restartPolicy: Always
